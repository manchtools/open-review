# open-review on GitLab CI — merge into .gitlab-ci.yml of the repo you want reviewed.
# Config comes from GROUP-level CI/CD variables (prefixed OR_), so nothing is per-repo:
#   OR_LLM_API_KEY (masked)  OR_LLM_BASE_URL  OR_MODEL_GENERATE  OR_MODEL_EVALUATE
#   OR_MODEL_JUDGE  OR_MODEL_DESCRIBE  OR_LLM_PROVIDER  OR_LLM_PROVIDER_FALLBACK

open-review:
  image:
    name: ghcr.io/manchtools/open-review:latest
    entrypoint: [""]           # let us call the CLI directly
  rules:
    - if: $CI_MERGE_REQUEST_IID
  variables:
    LLM_BASE_URL: "$OR_LLM_BASE_URL"
    LLM_API_KEY: "$OR_LLM_API_KEY"
    MODEL_GENERATE: "$OR_MODEL_GENERATE"
    MODEL_EVALUATE: "$OR_MODEL_EVALUATE"
    MODEL_JUDGE: "$OR_MODEL_JUDGE"
    MODEL_DESCRIBE: "$OR_MODEL_DESCRIBE"
    LLM_PROVIDER: "$OR_LLM_PROVIDER"
    LLM_PROVIDER_FALLBACK: "$OR_LLM_PROVIDER_FALLBACK"
    GIT_DEPTH: 0               # full history so the diff base resolves
  script:
    # CI_MERGE_REQUEST_TARGET_BRANCH_NAME is read automatically for the diff base.
    - open-review run --fail-on warning --gitlab-report gl-code-quality.json
  artifacts:
    reports:
      codequality: gl-code-quality.json
