# open-review on GitLab CI — merge into .gitlab-ci.yml of the repo you want reviewed.
# Config comes from GROUP-level CI/CD variables prefixed OR_ (OR_LLM_API_KEY masked, plus
# OR_LLM_BASE_URL, OR_MODEL_*, OR_LLM_PROVIDER, OR_* behaviour flags, …). GitLab injects every
# CI/CD variable into the job environment, and open-review reads OR_* natively — so there is no
# per-variable mapping and adding a new OR_ group variable needs no YAML change.

open-review:
  image:
    name: ghcr.io/manchtools/open-review:latest
    entrypoint: [""]           # call the CLI directly
  rules:
    - if: $CI_MERGE_REQUEST_IID
  variables:
    GIT_DEPTH: 0               # full history so the diff base resolves
  script:
    # gate, sarif, provider pin, etc. all come from the OR_* group variables.
    - open-review run --gitlab-report gl-code-quality.json
  artifacts:
    reports:
      codequality: gl-code-quality.json
