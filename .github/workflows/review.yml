# open-review reviewing itself (dogfood). Env-driven; forwards all OR_* org vars verbatim.
#
# Config is ENV-DRIVEN and org-wide: set variables once at the org/repo level with an `OR_` prefix
# and every reviewer picks them up — no job edits. This workflow maps ALL `OR_*` variables into the
# container (prefix stripped), so adding e.g. `OR_OPEN_REVIEW_SUMMARY=true` at the org changes
# behaviour everywhere with zero YAML changes.
#
#   Secret   OR_LLM_API_KEY
#   Vars     OR_LLM_BASE_URL  OR_MODEL_GENERATE  OR_MODEL_EVALUATE  OR_MODEL_JUDGE  OR_MODEL_DESCRIBE
#            OR_LLM_PROVIDER  OR_LLM_PROVIDER_FALLBACK  OR_OPEN_REVIEW_*  … (any OR_* is forwarded)

name: open-review
on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write     # aggregated review comment (auto-enabled by the token)
      security-events: write   # SARIF upload
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Map org variables → container env
        run: |
          echo '${{ toJSON(vars) }}' \
            | jq -r 'to_entries[] | select(.key|startswith("OR_")) | "\(.key)=\(.value)"' \
            > or.env

      - name: Review the diff
        env:
          OR_LLM_API_KEY: ${{ secrets.OR_LLM_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          docker run --rm --env-file or.env \
            -e OR_LLM_API_KEY -e GITHUB_TOKEN="$GH_TOKEN" \
            -e GITHUB_ACTIONS=true -e GITHUB_BASE_REF="${{ github.base_ref }}" \
            -v "$PWD":/repo -w /repo \
            ghcr.io/manchtools/open-review:latest run
          # gate, sarif, provider pin, --emit-* etc. all come from OR_* env — no flags here.

      - name: Upload SARIF (Security tab)
        if: always() && hashFiles('open-review.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: open-review.sarif

  codemap:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Map org variables → container env
        run: |
          echo '${{ toJSON(vars) }}' \
            | jq -r 'to_entries[] | select(.key|startswith("OR_")) | "\(.key)=\(.value)"' \
            > or.env
      - name: Regenerate codemap
        env:
          OR_LLM_API_KEY: ${{ secrets.OR_LLM_API_KEY }}
        run: |
          docker run --rm --env-file or.env -e OR_LLM_API_KEY \
            -u "$(id -u):$(id -g)" -e HOME=/tmp \
            -v "$PWD":/repo -w /repo \
            ghcr.io/manchtools/open-review:latest codemap --describe
      - name: Commit — direct to main, or via PR if the branch is protected
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if git diff --quiet -- .open-review/codemap.md; then echo "codemap unchanged"; exit 0; fi
          git config user.name  "open-review"
          git config user.email "open-review@users.noreply.github.com"
          git add .open-review/codemap.md
          git commit -m "docs: update open-review codemap [skip ci]"
          if git push origin "HEAD:${{ github.ref_name }}" 2>/dev/null; then
            echo "pushed directly to ${{ github.ref_name }}"
          else
            branch="open-review/codemap-${{ github.run_id }}"
            git push origin "HEAD:${branch}"
            gh pr create --base "${{ github.ref_name }}" --head "${branch}" \
              --title "docs: update open-review codemap" \
              --body "Automated codemap refresh — safe to merge." || echo "(PR already open)"
          fi
